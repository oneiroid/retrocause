<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrocause - Causality Graph Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>

  <div id="ui-overlay">
    <div id="title-bar">
      <h1>RETROCAUSE</h1>
      <span id="subtitle">causality graph explorer</span>
    </div>

    <div id="info-panel">
      <div id="stats">
        <div class="stat"><span class="label">Depth (time)</span><span id="stat-depth">0</span></div>
        <div class="stat"><span class="label">Branches</span><span id="stat-branches">0</span></div>
        <div class="stat"><span class="label">Attractors</span><span id="stat-attractors">0</span></div>
        <div class="stat"><span class="label">Scale</span><span id="stat-scale">events</span></div>
      </div>

      <div id="cursor-info">
        <div class="label">Attention Cursor</div>
        <div id="cursor-event">---</div>
        <div id="cursor-story">---</div>
      </div>
    </div>

    <div id="controls">
      <div id="control-group-nav">
        <button id="btn-play" title="Auto-traverse">|> TRAVERSE</button>
        <button id="btn-pause" title="Pause" style="display:none">|| PAUSE</button>
        <button id="btn-reset" title="Reset">RESET</button>
      </div>
      <div id="control-group-scale">
        <button id="btn-zoom-in" title="Zoom into finer events">+ ZOOM IN</button>
        <button id="btn-zoom-out" title="Zoom out to meta-patterns">- ZOOM OUT</button>
      </div>
      <div id="control-group-view">
        <button id="btn-stories" title="Toggle story archetypes overlay">STORIES</button>
        <button id="btn-attractors" title="Highlight attractors">ATTRACTORS</button>
        <button id="btn-regen" title="Generate new graph">NEW GRAPH</button>
      </div>
      <div id="scale-indicator">
        <div class="scale-level active" data-level="0">Events</div>
        <div class="scale-level" data-level="1">Sequences</div>
        <div class="scale-level" data-level="2">Arcs</div>
        <div class="scale-level" data-level="3">Stories</div>
      </div>
    </div>

    <div id="story-panel" class="hidden">
      <h3>Story Archetypes (Graph Topologies)</h3>
      <div id="story-list"></div>
    </div>

    <div id="legend">
      <div class="legend-item"><span class="dot dot-event"></span> Event</div>
      <div class="legend-item"><span class="dot dot-attractor"></span> Attractor</div>
      <div class="legend-item"><span class="dot dot-cursor"></span> Attention</div>
      <div class="legend-item"><span class="line line-causal"></span> Causal link</div>
      <div class="legend-item"><span class="line line-converge"></span> Convergence</div>
    </div>
  </div>
</div>

<script src="graph.js"></script>
<script src="layout.js"></script>
<script src="stories.js"></script>
<script src="renderer.js"></script>
<script src="app.js"></script>
</body>
</html>
