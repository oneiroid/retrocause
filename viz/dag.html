<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DAG Builder Viewer</title>
<style>
  :root {
    --bg: #0c0f14;
    --panel: #151a22;
    --panel-border: #242c38;
    --text: #d8dee6;
    --text-dim: #8a93a0;
    --accent: #6aa6ff;
    --converge: #ffc857;
    --pinned: #7dd3a5;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    background: var(--bg); color: var(--text);
    font-size: 13px;
  }
  #app { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
  #canvas-wrap { position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; background: var(--bg); cursor: grab; }
  canvas.grabbing { cursor: grabbing; }
  #sidebar {
    border-left: 1px solid var(--panel-border);
    background: var(--panel);
    padding: 12px 14px;
    overflow-y: auto;
  }
  #sidebar h2 { margin: 0 0 8px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  #sidebar .kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 8px; margin-bottom: 12px; }
  #sidebar .kv .k { color: var(--text-dim); }
  #sidebar ul { margin: 0; padding-left: 18px; max-height: 200px; overflow-y: auto; }
  #toolbar {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    background: rgba(21,26,34,0.9); border: 1px solid var(--panel-border);
    padding: 6px 8px; border-radius: 4px;
    display: flex; gap: 8px; align-items: center;
  }
  #toolbar button {
    background: #212834; color: var(--text); border: 1px solid var(--panel-border);
    padding: 3px 8px; font: inherit; cursor: pointer; border-radius: 3px;
  }
  #toolbar button:hover { background: #2b3340; }
  #toolbar button.active { background: var(--accent); color: #0c0f14; border-color: var(--accent); }
  #toolbar .stats { color: var(--text-dim); padding-left: 8px; border-left: 1px solid var(--panel-border); }
  #tooltip {
    position: absolute; pointer-events: none; padding: 4px 8px;
    background: #1f2530; border: 1px solid var(--panel-border); border-radius: 3px;
    font-size: 11px; color: var(--text); opacity: 0; transition: opacity 100ms;
    white-space: nowrap; z-index: 20;
  }
  #legend {
    position: absolute; bottom: 8px; left: 8px; z-index: 10;
    background: rgba(21,26,34,0.9); border: 1px solid var(--panel-border);
    padding: 6px 10px; border-radius: 4px; font-size: 11px; color: var(--text-dim);
    max-width: 70%;
  }
  #legend span.sw { display: inline-block; width: 10px; height: 10px; border-radius: 5px; vertical-align: middle; margin: 0 4px 0 10px; }
  #legend span.sw:first-child { margin-left: 0; }
  #hint {
    position: absolute; bottom: 8px; right: 12px; z-index: 10;
    color: var(--text-dim); font-size: 11px; user-select: none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div id="toolbar">
      <button id="btn-mode-full" class="active">full</button>
      <button id="btn-mode-summary">summary</button>
      <button id="btn-fit">fit</button>
      <button id="btn-focus">focus</button>
      <button id="btn-clear">clear</button>
      <button id="btn-freeze" class="active">live sim</button>
      <span class="stats" id="stats">loading&hellip;</span>
    </div>
    <div id="legend"></div>
    <div id="hint">drag = pan · wheel = zoom · click = select · dbl-click node = focus / supernode = drill</div>
    <canvas></canvas>
    <div id="tooltip"></div>
  </div>
  <aside id="sidebar">
    <h2>Inspector</h2>
    <div id="inspector-body">
      <p style="color: var(--text-dim)">Click a node to inspect.</p>
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script>
"use strict";

// ---- tuning ---------------------------------------------------------
const Y_SCALE = 90;        // px per generation (force-Y target)
const FORCE_CHARGE = -90;
const FORCE_LINK_DIST = 30;
const FORCE_COLLIDE = 9;
const WARM_TICKS = 220;    // run sim this long before settling
const FOCUS_HOPS = 2;
const LOD_LABEL_K = 0.7;   // labels appear above this zoom level
const LOD_EDGE_K  = 0.25;  // below this, draw every Nth edge

const KIND_COLOR = {
  open:         "#b48eff",
  actor_a:      "#6aa6ff",
  actor_b:      "#ffa85a",
  accepted:     "#5fbf72",
  walked:       "#c86464",
  timeout:      "#6a6a6a",
  rps_win:      "#5fbf72",
  rps_draw:     "#8a93a0",
  rps_wipeout:  "#c86464",
  alive:        "#6aa6ff",
  dead:         "#4a4a4a",
  terminal:     "#c86464",
};
const KIND_LABEL = {
  open: "open", actor_a: "actor a", actor_b: "actor b",
  accepted: "accepted", walked: "walked", timeout: "timeout",
  rps_win: "win/ended", rps_draw: "draw", rps_wipeout: "wipeout",
  alive: "alive", dead: "dead", terminal: "terminal",
};
const KIND_ORDER = [
  "open","actor_a","actor_b","accepted","walked","timeout",
  "rps_win","rps_draw","rps_wipeout","alive","dead","terminal",
];

// ---- load -----------------------------------------------------------
const params = new URLSearchParams(location.search);
const DATA_URL = params.get("data") || "dag.json";

d3.json(DATA_URL).then(run).catch(err => {
  document.getElementById("stats").textContent = "load failed: " + err.message;
  console.error(err);
});

function run(data) {
  // ---- prep -------------------------------------------------------
  // Force-sim mutates x/y. Seed from layout coords if present so the
  // first frame already looks reasonable; sim then relaxes.
  const nodes = data.nodes.map(n => ({
    ...n,
    x: (n.x || 0) * 28,
    y: (n.y || n.generation || 0) * Y_SCALE,
    _fy: (n.generation || 0) * Y_SCALE,  // soft y target (forceY)
  }));
  const nodesById = new Map(nodes.map(n => [n.id, n]));
  const edges = data.edges.map(e => ({
    source: nodesById.get(e.from),
    target: nodesById.get(e.to),
    action: e.action, type: e.type,
    from: e.from, to: e.to,
  }));

  const agg = data.aggregation || { nodes: [], edges: [] };
  const supers = agg.nodes.map(s => ({
    ...s,
    x: (s.x || 0) * 28,
    y: (s.generation || 0) * Y_SCALE,
    _fy: (s.generation || 0) * Y_SCALE,
  }));
  const supersById = new Map(supers.map(s => [s.id, s]));
  const superEdges = agg.edges.map(e => ({
    source: supersById.get(e.from),
    target: supersById.get(e.to),
    count: e.count,
    from: e.from, to: e.to,
  }));

  // adjacency for focus mode
  const adjOut = new Map(nodes.map(n => [n.id, []]));
  const adjIn  = new Map(nodes.map(n => [n.id, []]));
  edges.forEach(e => { adjOut.get(e.from).push(e.to); adjIn.get(e.to).push(e.from); });

  // viewer-side kindOf, mirrors builder/aggregate.py
  function kindOf(d) {
    const e = d.expr || "";
    if (/ACCEPTED/.test(e)) return "accepted";
    if (/WALKED/.test(e))   return "walked";
    if (/TIMEOUT/.test(e))  return "timeout";
    if (/^t\d+ open/.test(e)) return "open";
    const m = e.match(/ by (a|b)$/);
    if (m) return m[1] === "a" ? "actor_a" : "actor_b";
    if (/^r\d+ (WIN|END)/.test(e)) return "rps_win";
    if (/^r\d+ DRAW/.test(e))      return "rps_draw";
    if (/^r\d+ WIPEOUT/.test(e))   return "rps_wipeout";
    if (/^r\d+/.test(e))           return "alive";
    if (/dead/.test(e))            return "dead";
    if (d.terminal)                return "terminal";
    return "alive";
  }
  nodes.forEach(n => { n._kind = kindOf(n); });
  const presentKinds = new Set(nodes.map(n => n._kind).concat(supers.map(s => s.kind)));

  const salient = new Set(
    nodes.filter(n => n.in_degree >= 3 || n.terminal || n.pinned ||
                     (n.labels && n.labels.length > 0))
         .map(n => n.id)
  );

  // ---- stats ------------------------------------------------------
  document.getElementById("stats").textContent =
    `nodes=${data.meta.n_nodes} edges=${data.meta.n_edges} ` +
    `terminal=${data.meta.n_terminal} converge=${data.meta.n_convergence} ` +
    `super=${supers.length}/${superEdges.length}`;

  // ---- canvas -----------------------------------------------------
  const canvas = document.querySelector("canvas");
  const ctx = canvas.getContext("2d");
  let cssW = 0, cssH = 0;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    cssW = rect.width; cssH = rect.height;
    canvas.width  = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (sim) sim.force("x", d3.forceX(cssW / 2).strength(0.015));
    needsRender = true;
  }
  window.addEventListener("resize", resize);

  // ---- state ------------------------------------------------------
  let mode = "full";              // "full" | "summary"
  let transform = d3.zoomIdentity;
  let selected = null;            // node id (full) or super obj (summary)
  let selectedKind = null;        // "node" | "super"
  let focusSet = null;            // Set<id> | null
  let hovered = null;
  let hoveredKind = null;
  let needsRender = true;
  let simAlive = true;            // false = sim frozen

  // Quadtree built each render for hit-testing in current sim state.
  let nodeTree  = null;
  let superTree = null;

  // ---- zoom -------------------------------------------------------
  const d3c = d3.select(canvas);
  const zoom = d3.zoom()
    .scaleExtent([0.04, 8])
    .on("start", () => canvas.classList.add("grabbing"))
    .on("end",   () => canvas.classList.remove("grabbing"))
    .on("zoom",  (e) => { transform = e.transform; needsRender = true; });
  d3c.call(zoom);

  // ---- force sim --------------------------------------------------
  // We run two sims (full, summary) but only the active one ticks.
  // forceY pulls each node toward (generation * Y_SCALE) softly so
  // layers stay readable but the sim still gives organic spread.
  const fullSim = d3.forceSimulation(nodes)
    .force("link",   d3.forceLink(edges).id(d => d.id).distance(FORCE_LINK_DIST).strength(0.25))
    .force("charge", d3.forceManyBody().strength(FORCE_CHARGE).theta(0.9).distanceMax(400))
    .force("y",      d3.forceY(d => d._fy).strength(0.6))
    .force("x",      d3.forceX(0).strength(0.015))
    .force("collide",d3.forceCollide(FORCE_COLLIDE))
    .alpha(1).alphaDecay(0.025)
    .on("tick", () => { needsRender = true; });

  const summarySim = d3.forceSimulation(supers)
    .force("link",   d3.forceLink(superEdges).id(d => d.id).distance(80).strength(0.4))
    .force("charge", d3.forceManyBody().strength(-450).theta(0.9))
    .force("y",      d3.forceY(d => d._fy).strength(0.7))
    .force("x",      d3.forceX(0).strength(0.02))
    .force("collide",d3.forceCollide(d => 8 + Math.sqrt(d.count) * 2))
    .alpha(1).alphaDecay(0.03)
    .on("tick", () => { needsRender = true; });
  summarySim.stop();   // start frozen until summary mode is selected

  // After WARM_TICKS, freeze automatically to save CPU. User can
  // un-freeze via the toolbar.
  let warmTickCount = 0;
  fullSim.on("tick.warm", () => {
    warmTickCount++;
    if (warmTickCount >= WARM_TICKS && simAlive) {
      simAlive = false;
      fullSim.stop();
      document.getElementById("btn-freeze").textContent = "frozen";
      document.getElementById("btn-freeze").classList.remove("active");
    }
  });

  // ---- helpers ----------------------------------------------------
  function nodeRadius(n) { return 3.5 + Math.min(5, Math.log2(1 + n.in_degree)); }
  function superRadius(s) { return 7 + Math.sqrt(s.count) * 1.6; }

  const tx = (wx) => transform.x + wx * transform.k;
  const ty = (wy) => transform.y + wy * transform.k;
  const wx = (sx) => (sx - transform.x) / transform.k;
  const wy = (sy) => (sy - transform.y) / transform.k;

  // ---- render -----------------------------------------------------
  function render() {
    needsRender = false;
    ctx.clearRect(0, 0, cssW, cssH);
    if (mode === "summary") drawSummary();
    else                     drawFull();
  }

  function drawSummary() {
    superTree = d3.quadtree().x(s => s.x).y(s => s.y).addAll(supers);

    // --- super edges (single batched stroke, then per-edge arrow) ---
    ctx.strokeStyle = "rgba(130,145,170,0.55)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (const se of superEdges) {
      ctx.moveTo(tx(se.source.x), ty(se.source.y));
      ctx.lineTo(tx(se.target.x), ty(se.target.y));
    }
    ctx.stroke();

    for (const se of superEdges) {
      const a = se.source, b = se.target;
      const ax = tx(a.x), ay = ty(a.y), bx = tx(b.x), by = ty(b.y);
      const dx = bx - ax, dy = by - ay;
      const d = Math.hypot(dx, dy) || 1;
      const ux = dx / d, uy = dy / d;
      const rB = superRadius(b);
      drawArrow(bx - ux * (rB + 4), by - uy * (rB + 4), ux, uy,
                Math.max(4, Math.log2(1 + se.count) * 1.6),
                "rgba(130,145,170,0.85)");
    }

    // --- nodes ---
    for (const s of supers) {
      const cx = tx(s.x), cy = ty(s.y);
      const r = superRadius(s);
      ctx.fillStyle = KIND_COLOR[s.kind] || KIND_COLOR.alive;
      ctx.strokeStyle = (selectedKind === "super" && selected === s) ? "#fff"
                      : (hoveredKind === "super" && hovered === s)   ? "#eee"
                      : "#0c0f14";
      ctx.lineWidth = (selectedKind === "super" && selected === s) ? 2.6 : 1.4;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // count + kind label
      ctx.fillStyle = "#0c0f14";
      ctx.font = "bold 11px ui-monospace, Menlo, monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(String(s.count), cx, cy);
      ctx.fillStyle = "#8a93a0";
      ctx.font = "10px ui-monospace, Menlo, monospace";
      ctx.textBaseline = "alphabetic";
      ctx.fillText(`g${s.generation} ${KIND_LABEL[s.kind] || s.kind}`, cx, cy - r - 4);
    }
  }

  function drawFull() {
    nodeTree = d3.quadtree().x(n => n.x).y(n => n.y).addAll(nodes);

    const k = transform.k;
    const showLabels = k >= LOD_LABEL_K;
    const edgeStride = k < LOD_EDGE_K ? Math.max(1, Math.round(LOD_EDGE_K / k)) : 1;

    // viewport bounds (world coords)
    const vx0 = wx(-40), vy0 = wy(-40);
    const vx1 = wx(cssW + 40), vy1 = wy(cssH + 40);

    // --- edges in one batched stroke ---
    ctx.strokeStyle = "rgba(58,64,80,0.55)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    let drawn = 0;
    for (let i = 0; i < edges.length; i += edgeStride) {
      const e = edges[i];
      const a = e.source, b = e.target;
      if (focusSet && (!focusSet.has(e.from) || !focusSet.has(e.to))) continue;
      if ((a.x < vx0 && b.x < vx0) || (a.x > vx1 && b.x > vx1)) continue;
      if ((a.y < vy0 && b.y < vy0) || (a.y > vy1 && b.y > vy1)) continue;
      ctx.moveTo(tx(a.x), ty(a.y));
      ctx.lineTo(tx(b.x), ty(b.y));
      drawn++;
    }
    ctx.stroke();

    // --- highlighted incident edges (per-edge, on top) ---
    if (selected != null && selectedKind === "node") {
      ctx.strokeStyle = "rgba(106,166,255,1)";
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      for (const e of edges) {
        if (e.from !== selected && e.to !== selected) continue;
        ctx.moveTo(tx(e.source.x), ty(e.source.y));
        ctx.lineTo(tx(e.target.x), ty(e.target.y));
      }
      ctx.stroke();
    }

    // --- arrowheads: only if zoomed in enough to be visible ---
    if (k >= 0.5) {
      for (const e of edges) {
        const a = e.source, b = e.target;
        if (focusSet && (!focusSet.has(e.from) || !focusSet.has(e.to))) continue;
        if (a.x < vx0 || a.x > vx1 || a.y < vy0 || a.y > vy1) {
          if (b.x < vx0 || b.x > vx1 || b.y < vy0 || b.y > vy1) continue;
        }
        const ax = tx(a.x), ay = ty(a.y), bx = tx(b.x), by = ty(b.y);
        const dx = bx - ax, dy = by - ay;
        const d = Math.hypot(dx, dy) || 1;
        const ux = dx / d, uy = dy / d;
        const rB = nodeRadius(b);
        drawArrow(bx - ux * (rB + 4), by - uy * (rB + 4), ux, uy, 3.5,
                  "rgba(58,64,80,0.85)");
      }
    }

    // --- nodes (group by fill color to minimize state changes) ---
    // Build per-color paths.
    const byColor = new Map();
    for (const n of nodes) {
      if (focusSet && !focusSet.has(n.id)) continue;
      if (n.x < vx0 || n.x > vx1 || n.y < vy0 || n.y > vy1) continue;
      const c = KIND_COLOR[n._kind] || KIND_COLOR.alive;
      if (!byColor.has(c)) byColor.set(c, []);
      byColor.get(c).push(n);
    }
    for (const [color, list] of byColor) {
      ctx.fillStyle = color;
      ctx.strokeStyle = "#0c0f14";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (const n of list) {
        ctx.moveTo(tx(n.x) + nodeRadius(n), ty(n.y));
        ctx.arc(tx(n.x), ty(n.y), nodeRadius(n), 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.stroke();
    }

    // --- per-node decorations (converge ring, pinned, hovered, selected) ---
    for (const n of nodes) {
      if (focusSet && !focusSet.has(n.id)) continue;
      if (n.x < vx0 || n.x > vx1 || n.y < vy0 || n.y > vy1) continue;
      let stroke = null, sw = 1;
      if (n.strong_converge) { stroke = "#ffc857"; sw = 2.2; }
      else if (n.in_degree >= 3) { stroke = "#ffc857"; sw = 1.4; }
      if (n.pinned)              { stroke = "#7dd3a5"; sw = 2.2; }
      if (selectedKind === "node" && n.id === selected) { stroke = "#fff"; sw = 3; }
      else if (hoveredKind === "node" && n.id === hovered) { stroke = "#eee"; sw = 2; }
      if (!stroke) continue;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = sw;
      ctx.beginPath();
      ctx.arc(tx(n.x), ty(n.y), nodeRadius(n) + 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }

    // --- labels ---
    if (showLabels) {
      ctx.fillStyle = "#d8dee6";
      ctx.font = "10px ui-monospace, Menlo, monospace";
      ctx.textAlign = "center"; ctx.textBaseline = "bottom";
      for (const n of nodes) {
        if (!salient.has(n.id)) continue;
        if (focusSet && !focusSet.has(n.id)) continue;
        if (n.x < vx0 || n.x > vx1 || n.y < vy0 || n.y > vy1) continue;
        ctx.fillText(shortLabel(n), tx(n.x), ty(n.y) - nodeRadius(n) - 3);
      }
    }
  }

  function drawArrow(ex, ey, ux, uy, size, color) {
    const nx = -uy, ny = ux;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - ux * size + nx * size * 0.5, ey - uy * size + ny * size * 0.5);
    ctx.lineTo(ex - ux * size - nx * size * 0.5, ey - uy * size - ny * size * 0.5);
    ctx.closePath();
    ctx.fill();
  }

  function shortLabel(d) {
    const e = (d.expr || "").trim();
    if (!e) return `#${d.id}`;
    const parts = e.split(/\s+/);
    const head = parts.slice(0, 3).join(" ");
    return head.length > 28 ? head.slice(0, 27) + "..." : head;
  }

  // ---- main render loop ------------------------------------------
  function frame() {
    if (needsRender) render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- hit testing -----------------------------------------------
  function hitAt(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const sx = clientX - rect.left, sy = clientY - rect.top;
    const wmx = wx(sx), wmy = wy(sy);
    const R = 12 / transform.k;
    if (mode === "summary") {
      if (!superTree) return null;
      const s = superTree.find(wmx, wmy, Math.max(R, 30));
      return s ? { kind: "super", obj: s } : null;
    }
    if (!nodeTree) return null;
    const n = nodeTree.find(wmx, wmy, R);
    return n ? { kind: "node", obj: n } : null;
  }

  // ---- interactions ----------------------------------------------
  const tip = document.getElementById("tooltip");
  canvas.addEventListener("mousemove", (ev) => {
    const h = hitAt(ev.clientX, ev.clientY);
    const prev = hovered, prevK = hoveredKind;
    hovered = h ? h.obj : null;
    hoveredKind = h ? h.kind : null;
    if (h) {
      tip.style.opacity = 1;
      tip.innerHTML = h.kind === "super"
        ? `<b>gen${h.obj.generation} / ${KIND_LABEL[h.obj.kind] || h.obj.kind}</b><br/>count=${h.obj.count}`
        : `<b>#${h.obj.id}</b> ${escapeHtml(h.obj.expr)}<br/>in=${h.obj.in_degree} out=${h.obj.out_degree}`;
      tip.style.left = (ev.clientX + 12) + "px";
      tip.style.top  = (ev.clientY + 12) + "px";
    } else {
      tip.style.opacity = 0;
    }
    if (prev !== hovered || prevK !== hoveredKind) needsRender = true;
  });
  canvas.addEventListener("mouseleave", () => {
    hovered = null; hoveredKind = null;
    tip.style.opacity = 0;
    needsRender = true;
  });
  canvas.addEventListener("click", (ev) => {
    const h = hitAt(ev.clientX, ev.clientY);
    if (!h) return;
    selectedKind = h.kind;
    selected = h.kind === "node" ? h.obj.id : h.obj;
    renderInspector();
    needsRender = true;
  });
  canvas.addEventListener("dblclick", (ev) => {
    const h = hitAt(ev.clientX, ev.clientY);
    if (!h) return;
    if (h.kind === "super") {
      setMode("full");
      zoomToIds(h.obj.member_ids, 1.4);
    } else {
      selectedKind = "node"; selected = h.obj.id;
      setFocus(true);
    }
    renderInspector();
    needsRender = true;
  });

  // ---- inspector --------------------------------------------------
  function renderInspector() {
    const c = document.getElementById("inspector-body");
    if (!selected && selectedKind == null) {
      c.innerHTML = `<p style="color: var(--text-dim)">Click a node to inspect.</p>`;
      return;
    }
    if (selectedKind === "super") {
      const s = selected;
      const members = s.member_ids.slice(0, 80);
      c.innerHTML = `
        <div class="kv">
          <div class="k">kind</div><div>${escapeHtml(KIND_LABEL[s.kind] || s.kind)}</div>
          <div class="k">generation</div><div>${s.generation}</div>
          <div class="k">count</div><div>${s.count}</div>
        </div>
        <h2>Members (${s.count}${s.count > members.length ? `, first ${members.length}` : ""})</h2>
        <ul>${members.map(id => `<li><a href="#" data-goto-node="${id}">#${id}</a> <span style="color: var(--text-dim)">${escapeHtml(nodesById.get(id).expr)}</span></li>`).join("")}</ul>
      `;
    } else {
      const d = nodesById.get(selected);
      const preds = edges.filter(e => e.to === d.id);
      const succs = edges.filter(e => e.from === d.id);
      const labels = d.labels && d.labels.length ? d.labels.join(", ") : "-";
      c.innerHTML = `
        <div class="kv">
          <div class="k">id</div><div>#${d.id}</div>
          <div class="k">expr</div><div>${escapeHtml(d.expr)}</div>
          <div class="k">generation</div><div>${d.generation}</div>
          <div class="k">in / out</div><div>${d.in_degree} / ${d.out_degree}</div>
          <div class="k">terminal</div><div>${d.terminal}</div>
          <div class="k">pinned</div><div>${d.pinned}</div>
          <div class="k">labels</div><div>${escapeHtml(labels)}</div>
        </div>
        <h2>Predecessors (${preds.length})</h2>
        <ul>${preds.slice(0,60).map(e => `<li><a href="#" data-goto-node="${e.from}">#${e.from}</a> <span style="color: var(--text-dim)">via ${escapeHtml(e.action)}</span></li>`).join("") || '<li style="color: var(--text-dim)">none</li>'}</ul>
        <h2>Successors (${succs.length})</h2>
        <ul>${succs.slice(0,60).map(e => `<li><a href="#" data-goto-node="${e.to}">#${e.to}</a> <span style="color: var(--text-dim)">via ${escapeHtml(e.action)}</span></li>`).join("") || '<li style="color: var(--text-dim)">none</li>'}</ul>
      `;
    }
    c.querySelectorAll("a[data-goto-node]").forEach(a => {
      a.addEventListener("click", (ev) => {
        ev.preventDefault();
        const id = parseInt(a.dataset.gotoNode, 10);
        if (!nodesById.get(id)) return;
        setMode("full");
        selectedKind = "node"; selected = id;
        zoomToIds([id], 2);
        renderInspector();
        needsRender = true;
      });
    });
  }

  // ---- focus ------------------------------------------------------
  function setFocus(on) {
    if (!on || selectedKind !== "node" || selected == null) {
      focusSet = null;
    } else {
      focusSet = bfsNeighborhood(selected, FOCUS_HOPS);
    }
    document.getElementById("btn-focus").classList.toggle("active", !!focusSet);
    needsRender = true;
  }
  function bfsNeighborhood(startId, hops) {
    const seen = new Set([startId]);
    let frontier = [startId];
    for (let h = 0; h < hops; h++) {
      const next = [];
      for (const id of frontier) {
        for (const to of (adjOut.get(id) || [])) if (!seen.has(to)) { seen.add(to); next.push(to); }
        for (const fr of (adjIn.get(id)  || [])) if (!seen.has(fr)) { seen.add(fr); next.push(fr); }
      }
      frontier = next;
      if (!frontier.length) break;
    }
    return seen;
  }

  // ---- mode toggle ------------------------------------------------
  const btnFull    = document.getElementById("btn-mode-full");
  const btnSummary = document.getElementById("btn-mode-summary");
  function setMode(m) {
    if (m === mode) return;
    mode = m;
    btnFull.classList.toggle("active", m === "full");
    btnSummary.classList.toggle("active", m === "summary");
    if (m === "summary") {
      summarySim.alpha(0.6).restart();
    } else {
      summarySim.stop();
      if (simAlive) fullSim.alpha(0.4).restart();
    }
    needsRender = true;
    fit();
  }
  btnFull.onclick    = () => setMode("full");
  btnSummary.onclick = () => setMode("summary");

  // ---- freeze toggle ----------------------------------------------
  const btnFreeze = document.getElementById("btn-freeze");
  btnFreeze.onclick = () => {
    if (mode === "summary") {
      // toggle summary sim
      if (summarySim.alpha() > 0.01) { summarySim.stop(); btnFreeze.textContent = "frozen"; btnFreeze.classList.remove("active"); }
      else { summarySim.alpha(0.6).restart(); btnFreeze.textContent = "live sim"; btnFreeze.classList.add("active"); }
    } else {
      simAlive = !simAlive;
      if (simAlive) { fullSim.alpha(0.5).restart(); btnFreeze.textContent = "live sim"; btnFreeze.classList.add("active"); warmTickCount = 0; }
      else { fullSim.stop(); btnFreeze.textContent = "frozen"; btnFreeze.classList.remove("active"); }
    }
  };

  // ---- fit / zoom-to ----------------------------------------------
  function fit() {
    const pts = (mode === "summary") ? supers : nodes;
    if (!pts.length) return;
    let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
    for (const p of pts) {
      if (p.x < x0) x0 = p.x; if (p.x > x1) x1 = p.x;
      if (p.y < y0) y0 = p.y; if (p.y > y1) y1 = p.y;
    }
    applyFit(x0, y0, x1, y1, 0.95, 2);
  }
  function zoomToIds(ids, maxScale) {
    const ns = ids.map(id => nodesById.get(id)).filter(Boolean);
    if (!ns.length) return;
    let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
    for (const n of ns) {
      if (n.x < x0) x0 = n.x; if (n.x > x1) x1 = n.x;
      if (n.y < y0) y0 = n.y; if (n.y > y1) y1 = n.y;
    }
    if (x1 - x0 < 200) { const c = (x0+x1)/2; x0 = c - 100; x1 = c + 100; }
    if (y1 - y0 < 200) { const c = (y0+y1)/2; y0 = c - 100; y1 = c + 100; }
    applyFit(x0, y0, x1, y1, 0.85, maxScale);
  }
  function applyFit(x0, y0, x1, y1, fill, maxScale) {
    const pad = 60;
    const spanX = Math.max(1, x1 - x0);
    const spanY = Math.max(1, y1 - y0);
    const scale = Math.min(
      (cssW - 2*pad) / spanX,
      (cssH - 2*pad) / spanY,
      maxScale || 2
    ) * fill;
    const txv = cssW / 2 - scale * (x0 + x1) / 2;
    const tyv = cssH / 2 - scale * (y0 + y1) / 2;
    d3c.transition().duration(350).call(
      zoom.transform, d3.zoomIdentity.translate(txv, tyv).scale(scale)
    );
  }

  // ---- toolbar buttons --------------------------------------------
  document.getElementById("btn-fit").onclick = fit;
  document.getElementById("btn-focus").onclick = () => setFocus(!focusSet);
  document.getElementById("btn-clear").onclick = () => {
    selected = null; selectedKind = null; focusSet = null;
    document.getElementById("btn-focus").classList.remove("active");
    renderInspector();
    needsRender = true;
  };

  // ---- legend -----------------------------------------------------
  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  KIND_ORDER.filter(k => presentKinds.has(k)).forEach(k => {
    const dot = document.createElement("span");
    dot.className = "sw";
    dot.style.background = KIND_COLOR[k];
    legend.appendChild(dot);
    legend.appendChild(document.createTextNode(KIND_LABEL[k] || k));
  });
  [
    ["converge", "#ffc857"],
    ["pinned",   "#7dd3a5"],
    ["selected", "#ffffff"],
  ].forEach(([txt, col]) => {
    const dot = document.createElement("span");
    dot.className = "sw";
    dot.style.background = "transparent";
    dot.style.border = `2px solid ${col}`;
    legend.appendChild(dot);
    legend.appendChild(document.createTextNode(txt));
  });

  // ---- boot -------------------------------------------------------
  resize();
  // Let the sim warm a moment, then fit.
  setTimeout(fit, 600);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
</script>
</body>
</html>
