<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DAG Builder Viewer</title>
<style>
  :root {
    --bg: #0c0f14;
    --panel: #151a22;
    --panel-border: #242c38;
    --text: #d8dee6;
    --text-dim: #8a93a0;
    --accent: #6aa6ff;
    --edge: #3a4050;
    --node-alive: #6aa6ff;
    --node-dead: #4a4a4a;
    --node-terminal: #c86464;
    --converge: #ffc857;
    --pinned: #7dd3a5;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    background: var(--bg); color: var(--text);
    font-size: 13px;
  }
  #app { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
  #canvas-wrap { position: relative; }
  svg { display: block; width: 100%; height: 100%; background: var(--bg); cursor: grab; }
  svg:active { cursor: grabbing; }
  #sidebar {
    border-left: 1px solid var(--panel-border);
    background: var(--panel);
    padding: 12px 14px;
    overflow-y: auto;
  }
  #sidebar h2 { margin: 0 0 8px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  #sidebar .kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 8px; margin-bottom: 12px; }
  #sidebar .kv .k { color: var(--text-dim); }
  #sidebar ul { margin: 0; padding-left: 18px; }
  #toolbar {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    background: rgba(21,26,34,0.9); border: 1px solid var(--panel-border);
    padding: 6px 8px; border-radius: 4px;
    display: flex; gap: 8px; align-items: center;
  }
  #toolbar button {
    background: #212834; color: var(--text); border: 1px solid var(--panel-border);
    padding: 3px 8px; font: inherit; cursor: pointer; border-radius: 3px;
  }
  #toolbar button:hover { background: #2b3340; }
  #toolbar button.active { background: var(--accent); color: #0c0f14; border-color: var(--accent); }
  #toolbar .stats { color: var(--text-dim); padding-left: 8px; border-left: 1px solid var(--panel-border); }
  #tooltip {
    position: absolute; pointer-events: none; padding: 4px 8px;
    background: #1f2530; border: 1px solid var(--panel-border); border-radius: 3px;
    font-size: 11px; color: var(--text); opacity: 0; transition: opacity 100ms;
    white-space: nowrap; z-index: 20;
  }
  .node-circle { stroke: #0c0f14; stroke-width: 1.2px; cursor: pointer; }
  .node-circle.converge { stroke: var(--converge); stroke-width: 2px; }
  .node-circle.strong-converge { stroke: var(--converge); stroke-width: 2.6px; filter: drop-shadow(0 0 5px rgba(255,200,87,0.7)); }
  .node-circle.pinned { stroke: var(--pinned); stroke-width: 2.4px; }
  .node-circle.selected { stroke: #fff; stroke-width: 3px; }
  .node-circle.tpl-match { stroke: #c792ea; stroke-width: 2.2px; }
  .node-label { font-size: 9px; fill: var(--text-dim); pointer-events: none; text-anchor: middle; }
  .edge-line { stroke: var(--edge); stroke-width: 0.9px; fill: none; opacity: 0.55; }
  .edge-line.highlight { stroke: var(--accent); stroke-width: 1.8px; opacity: 1; }
  #legend {
    position: absolute; bottom: 8px; left: 8px; z-index: 10;
    background: rgba(21,26,34,0.9); border: 1px solid var(--panel-border);
    padding: 6px 10px; border-radius: 4px; font-size: 11px; color: var(--text-dim);
  }
  #legend span.sw { display: inline-block; width: 10px; height: 10px; border-radius: 5px; vertical-align: middle; margin: 0 4px 0 10px; }
  #legend span.sw:first-child { margin-left: 0; }
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <div id="toolbar">
      <button id="btn-fit">fit</button>
      <button id="btn-bloom">bloom</button>
      <button id="btn-toggle-converge" class="active">converge</button>
      <button id="btn-toggle-labels">labels</button>
      <span class="stats" id="stats">loading&hellip;</span>
    </div>
    <div id="template-bar" style="position:absolute;top:48px;left:8px;z-index:10;display:flex;gap:6px;flex-wrap:wrap;max-width:70%;background:rgba(21,26,34,0.9);border:1px solid var(--panel-border);padding:4px 6px;border-radius:4px;font-size:11px;"></div>
    <div id="legend">
      <span class="sw" style="background: var(--node-alive)"></span>alive
      <span class="sw" style="background: var(--node-dead)"></span>dead
      <span class="sw" style="background: var(--node-terminal)"></span>terminal(gen-cap)
      <span class="sw" style="border: 2px solid var(--converge); background: transparent"></span>strong converge
      <span class="sw" style="border: 2px solid #c792ea; background: transparent"></span>template match
      <span class="sw" style="border: 2px solid var(--pinned); background: transparent"></span>pinned
    </div>
    <svg></svg>
    <div id="tooltip"></div>
  </div>
  <aside id="sidebar">
    <h2>Inspector</h2>
    <div id="inspector-body">
      <p style="color: var(--text-dim)">Click a node to inspect.</p>
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script>
// ---- load -----------------------------------------------------------
const params = new URLSearchParams(location.search);
const DATA_URL = params.get("data") || "dag.json";

d3.json(DATA_URL).then(run).catch(err => {
  document.getElementById("stats").textContent = "load failed: " + err.message;
  console.error(err);
});

function run(data) {
  const svg = d3.select("svg");
  const width = () => svg.node().clientWidth;
  const height = () => svg.node().clientHeight;

  // ---- prep data ----------------------------------------------------
  // Convert edges into d3-force-link shape (source/target reference objs).
  const nodes = data.nodes.map(n => ({...n}));
  const idx = new Map(nodes.map(n => [n.id, n]));
  const edges = data.edges.map(e => ({
    source: idx.get(e.from),
    target: idx.get(e.to),
    action: e.action, type: e.type,
  }));
  const maxGen = d3.max(nodes, n => n.generation);
  const rowGap = 80;

  // Stats line.
  document.getElementById("stats").textContent =
    `nodes=${data.meta.n_nodes} edges=${data.meta.n_edges} ` +
    `terminal=${data.meta.n_terminal} converge=${data.meta.n_convergence}`;

  // ---- svg structure ------------------------------------------------
  svg.selectAll("*").remove();
  const g_root = svg.append("g").attr("class", "root");
  const g_edges = g_root.append("g").attr("class", "edges");
  const g_nodes = g_root.append("g").attr("class", "nodes");
  const g_labels = g_root.append("g").attr("class", "labels");

  // Zoom/pan.
  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on("zoom", (e) => g_root.attr("transform", e.transform));
  svg.call(zoom);

  // ---- force sim ----------------------------------------------------
  // y is softly pinned to generation * rowGap. x floats.
  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(edges).distance(36).strength(0.25))
    .force("charge", d3.forceManyBody().strength(-120))
    .force("x", d3.forceX(() => width() / 2).strength(0.02))
    .force("y", d3.forceY(d => (d.generation / Math.max(1, maxGen)) * (height() - 80) + 40).strength(0.9))
    .force("collide", d3.forceCollide().radius(8))
    .alpha(1).alphaDecay(0.035);

  // ---- render nodes -------------------------------------------------
  // State that classFor reads must exist BEFORE the d3 join runs.
  let showConv = true;
  let activeTemplate = null;
  function classFor(d) {
    const cls = ["node-circle"];
    if (showConv && d.strong_converge) cls.push("strong-converge");
    else if (showConv && d.in_degree >= 3) cls.push("converge");
    if (activeTemplate && (d.template_starts || []).includes(activeTemplate)) cls.push("tpl-match");
    if (d.pinned) cls.push("pinned");
    return cls.join(" ");
  }

  const colorFor = d => {
    if (d.terminal && !/dead/.test(d.expr)) return "var(--node-terminal)";
    if (/dead/.test(d.expr)) return "var(--node-dead)";
    return "var(--node-alive)";
  };
  const sizeFor = d => 4 + Math.min(6, Math.log2(1 + d.in_degree));

  const node = g_nodes.selectAll("circle")
    .data(nodes, d => d.id)
    .join("circle")
    .attr("class", d => classFor(d))
    .attr("r", sizeFor)
    .attr("fill", colorFor)
    .on("mouseover", (ev, d) => showTip(ev, d))
    .on("mousemove", (ev, _) => moveTip(ev))
    .on("mouseout", hideTip)
    .on("click", (ev, d) => selectNode(d))
    .call(d3.drag()
      .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on("end", (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

  // ---- render edges -------------------------------------------------
  const edge = g_edges.selectAll("line")
    .data(edges)
    .join("line")
    .attr("class", "edge-line");

  // ---- render labels (hidden by default for large graphs) -----------
  const label = g_labels.selectAll("text")
    .data(nodes, d => d.id)
    .join("text")
    .attr("class", "node-label")
    .attr("dy", 14)
    .text(d => `#${d.id}`)
    .style("display", nodes.length > 120 ? "none" : "block");

  // ---- tick ---------------------------------------------------------
  sim.on("tick", () => {
    edge
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });

  // ---- interactions -------------------------------------------------
  let selected = null;
  function selectNode(d) {
    selected = d;
    node.classed("selected", n => n.id === d.id);
    // highlight incident edges
    const incident = new Set();
    edges.forEach((e, i) => { if (e.source.id === d.id || e.target.id === d.id) incident.add(i); });
    edge.classed("highlight", (_, i) => incident.has(i));
    renderInspector(d, edges);
  }

  function renderInspector(d, allEdges) {
    const preds = allEdges.filter(e => e.target.id === d.id);
    const succs = allEdges.filter(e => e.source.id === d.id);
    const labels = d.labels && d.labels.length ? d.labels.join(", ") : "-";
    const body = `
      <div class="kv">
        <div class="k">id</div><div>#${d.id}</div>
        <div class="k">expr</div><div>${escapeHtml(d.expr)}</div>
        <div class="k">generation</div><div>${d.generation}</div>
        <div class="k">in / out</div><div>${d.in_degree} / ${d.out_degree}</div>
        <div class="k">terminal</div><div>${d.terminal}</div>
        <div class="k">pinned</div><div>${d.pinned}</div>
        <div class="k">labels</div><div>${escapeHtml(labels)}</div>
      </div>
      <h2>Predecessors (${preds.length})</h2>
      <ul>${preds.map(e => `<li><a href="#" data-goto="${e.source.id}">#${e.source.id}</a> <span style="color: var(--text-dim)">via ${escapeHtml(e.action)}</span></li>`).join("") || '<li style="color: var(--text-dim)">none</li>'}</ul>
      <h2>Successors (${succs.length})</h2>
      <ul>${succs.map(e => `<li><a href="#" data-goto="${e.target.id}">#${e.target.id}</a> <span style="color: var(--text-dim)">via ${escapeHtml(e.action)}</span></li>`).join("") || '<li style="color: var(--text-dim)">none</li>'}</ul>
    `;
    const container = document.getElementById("inspector-body");
    container.innerHTML = body;
    container.querySelectorAll("a[data-goto]").forEach(a => {
      a.addEventListener("click", (ev) => {
        ev.preventDefault();
        const target = idx.get(parseInt(a.dataset.goto, 10));
        if (target) selectNode(target);
      });
    });
  }

  // ---- tooltip ------------------------------------------------------
  const tip = document.getElementById("tooltip");
  function showTip(ev, d) {
    tip.style.opacity = 1;
    tip.innerHTML = `<b>#${d.id}</b> ${escapeHtml(d.expr)}<br/>in=${d.in_degree} out=${d.out_degree}`;
    moveTip(ev);
  }
  function moveTip(ev) {
    tip.style.left = (ev.clientX + 12) + "px";
    tip.style.top = (ev.clientY + 12) + "px";
  }
  function hideTip() { tip.style.opacity = 0; }

  // ---- toolbar buttons ----------------------------------------------
  document.getElementById("btn-fit").onclick = fit;
  function fit() {
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const x0 = d3.min(xs), x1 = d3.max(xs), y0 = d3.min(ys), y1 = d3.max(ys);
    const pad = 40;
    const w = width(), h = height();
    const scale = Math.min((w - 2*pad) / (x1 - x0 + 1), (h - 2*pad) / (y1 - y0 + 1), 3);
    const tx = w/2 - scale * (x0 + x1) / 2;
    const ty = h/2 - scale * (y0 + y1) / 2;
    svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  let bloomActive = false;
  document.getElementById("btn-bloom").onclick = () => {
    if (bloomActive) return;
    bloomActive = true;
    node.transition().duration(0).attr("opacity", 0);
    edge.transition().duration(0).attr("opacity", 0);
    for (let g = 0; g <= maxGen; g++) {
      setTimeout(() => {
        node.filter(d => d.generation === g).transition().duration(400).attr("opacity", 1);
        edge.filter(d => d.source.generation === g || d.target.generation === g).transition().duration(400).attr("opacity", 0.55);
      }, g * 220);
    }
    setTimeout(() => { bloomActive = false; }, (maxGen + 1) * 220);
  };

  const btnConverge = document.getElementById("btn-toggle-converge");
  btnConverge.onclick = () => {
    btnConverge.classList.toggle("active");
    showConv = btnConverge.classList.contains("active");
    node.attr("class", d => classFor(d));
  };

  // --- template picker (dynamic, from data.meta.templates) ---
  const tplBar = document.getElementById("template-bar");
  if (data.meta.templates && data.meta.templates.length) {
    const label = document.createElement("span");
    label.textContent = "templates:";
    label.style.color = "var(--text-dim)";
    tplBar.appendChild(label);
    data.meta.templates.forEach(t => {
      const btn = document.createElement("button");
      btn.textContent = `${t.key} (x${t.count})`;
      btn.onclick = () => {
        activeTemplate = (activeTemplate === t.key) ? null : t.key;
        tplBar.querySelectorAll("button").forEach(b => b.classList.remove("active"));
        if (activeTemplate) btn.classList.add("active");
        node.attr("class", d => classFor(d));
      };
      tplBar.appendChild(btn);
    });
  }

  const btnLabels = document.getElementById("btn-toggle-labels");
  btnLabels.onclick = () => {
    btnLabels.classList.toggle("active");
    const on = btnLabels.classList.contains("active");
    label.style("display", on ? "block" : "none");
  };

  // auto-fit after sim warms up
  setTimeout(fit, 1200);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
</script>
</body>
</html>
